<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030810" />
    <link rel="icon" type="image/x-icon" href="/arcade-website/favicon-arcade.ico" />
    <link rel="icon" type="image/svg+xml" href="/arcade-website/favicon-arcade.svg" />
    <link rel="apple-touch-icon" href="/arcade-website/apple-touch-icon-arcade.png" />
    <title>ARCADE</title>
    <script>
      // Restore path after GitHub Pages 404 redirect
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var url = new URL(redirect);
          var path = url.pathname + url.search + url.hash;
          window.history.replaceState(null, '', path);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
